<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Grounded critical-fields workflow</title>
  <desc id="desc">Source documents flow into critical-field extraction with evidence, then through validation and business rules, into a review interface, with optional narrative synthesis at the end.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #16324f; }
    .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: 1.4px; fill: #167d7f; }
    .heading { font-size: 18px; font-weight: 750; }
    .detail { font-size: 14px; fill: #425466; }
    .card { fill: #f6f8fb; stroke: #c8d3df; stroke-width: 2; }
    .focus { fill: #e8f1f5; stroke: #167d7f; stroke-width: 2.5; }
    .optional { fill: #fff4e5; stroke: #d9822b; stroke-width: 2; }
    .arrow { fill: none; stroke: #7d91a6; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .number { font-size: 14px; font-weight: 700; fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e7edf3; }
      .detail { fill: #bdc9d4; }
      .card { fill: #172432; stroke: #53687c; }
      .focus { fill: #17343b; stroke: #43a9aa; }
      .optional { fill: #3a2a1b; }
      .arrow { stroke: #8fa4b7; }
    }
  </style>

  <text class="eyebrow" x="480" y="36" text-anchor="middle">FROM SOURCE TO DECISION SUPPORT</text>

  <rect class="card" x="30" y="86" width="158" height="184" rx="16"/>
  <circle cx="60" cy="116" r="17" fill="#167d7f"/><text class="number" x="60" y="121" text-anchor="middle">1</text>
  <text class="heading" x="52" y="162">Source</text><text class="heading" x="52" y="186">documents</text>
  <text class="detail" x="52" y="222">Applications</text><text class="detail" x="52" y="246">Reports · forms</text>

  <path class="arrow" d="M188 178h32m-10-10 10 10-10 10"/>
  <rect class="focus" x="220" y="66" width="210" height="224" rx="16"/>
  <circle cx="250" cy="96" r="17" fill="#167d7f"/><text class="number" x="250" y="101" text-anchor="middle">2</text>
  <text class="heading" x="242" y="140">Critical fields</text>
  <text class="detail" x="242" y="174">Normalized value</text><text class="detail" x="242" y="198">Raw wording</text>
  <text class="detail" x="242" y="222">Status</text><text class="detail" x="242" y="246">Supporting evidence</text>

  <path class="arrow" d="M430 178h32m-10-10 10 10-10 10"/>
  <rect class="card" x="462" y="86" width="174" height="184" rx="16"/>
  <circle cx="492" cy="116" r="17" fill="#167d7f"/><text class="number" x="492" y="121" text-anchor="middle">3</text>
  <text class="heading" x="484" y="162">Validate</text><text class="heading" x="484" y="186">and route</text>
  <text class="detail" x="484" y="222">Business rules</text><text class="detail" x="484" y="246">Exception handling</text>

  <path class="arrow" d="M636 178h32m-10-10 10 10-10 10"/>
  <rect class="card" x="668" y="86" width="174" height="184" rx="16"/>
  <circle cx="698" cy="116" r="17" fill="#167d7f"/><text class="number" x="698" y="121" text-anchor="middle">4</text>
  <text class="heading" x="690" y="162">Review</text><text class="heading" x="690" y="186">interface</text>
  <text class="detail" x="690" y="222">Scan · verify</text><text class="detail" x="690" y="246">Resolve conflicts</text>

  <path class="arrow" d="M755 270v35m-10-10 10 10 10-10"/>
  <rect class="optional" x="618" y="305" width="274" height="60" rx="14"/>
  <text class="heading" x="755" y="332" text-anchor="middle">5 · Optional narrative</text>
  <text class="detail" x="755" y="353" text-anchor="middle">Synthesis only where it adds value</text>

  <text class="detail" x="325" y="333" text-anchor="middle">Each layer can be evaluated separately.</text>
  <path d="M220 316h210" stroke="#167d7f" stroke-width="3" stroke-linecap="round"/>
</svg>
